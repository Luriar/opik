feature:
  version: "v1.0"

  global_rules:
    feature_date_rule: "T-1"
    use_absolute_price: false
    use_absolute_volume: false
    use_ratio_features: true
    use_cross_sectional_features: true
    shift_before_rolling: true
    allow_ticker_as_feature: false

  identifiers:
    date_column: "date"
    id_column: "ticker"

  categorical_features:
    - sector
    - market_type
    - market_cap_group

  excluded_columns:
    - date
    - ticker
    - name
    - open
    - high
    - low
    - close
    - volume
    - target_rank_return
    - target_gap
    - target_intraday

  price:
    enabled: true
    features:
      - return_1d
      - return_3d
      - return_5d
      - return_20d
      - return_60d
      - close_ma5_ratio
      - close_ma20_ratio
      - close_ma60_ratio
      - close_position

  momentum:
    enabled: true
    features:
      - momentum_5d
      - momentum_20d
      - momentum_diff
      - momentum_accel
      - relative_return_5d_vs_market
      - relative_return_20d_vs_market
      - relative_return_20d_vs_sector
      - momentum_rank_pct
      - return_rank_pct

  volume:
    enabled: true
    features:
      - volume_change_1d
      - relative_trading_value
      - trading_value_rank_pct

  volatility:
    enabled: true
    features:
      - volatility_5d
      - volatility_20d
      - intraday_range_5d
      - atr_percent
      - volatility_rank_pct

  candlestick:
    enabled: true
    features:
      - body
      - upper_shadow
      - lower_shadow
      - body_ratio
      - close_position

  breakout:
    enabled: true
    internal_features:
      - high_20d
      - low_20d
    features:
      - close_to_20d_high
      - close_to_20d_low
      - breakout_strength
      - breakout_rank_pct

  technical:
    enabled: true
    features:
      - rsi14
      - rsi_change_5d
      - rsi_rank_pct
      - macd_hist_ratio
      - macd_rank_pct
      - bb_position
      - bb_width
      - bb_position_change_5d
      - bb_position_rank_pct
      - atr_rank_pct

  cross_sectional:
    enabled: true
    rank_method: "pct"
    groupby_column: "date"
    features:
      - return_5d_rank_pct
      - return_20d_rank_pct
      - momentum_rank_pct
      - momentum_20d_rank_pct
      - momentum_diff_rank_pct
      - trading_value_rank_pct
      - volume_change_rank_pct
      - volatility_rank_pct
      - atr_rank_pct
      - bb_width_rank_pct
      - breakout_rank_pct
      - low_rebound_rank_pct
      - relative_return_5d_rank_pct
      - sector_relative_rank_pct

  macro:
    enabled: true
    features:
      - nasdaq_return_1d
      - sox_return_1d
      - sp500_return_1d
      - vix_change_1d
      - usdkrw_return_1d
      - wti_return_1d

    optional_features_v2:
      - us10y_change_1d
      - dxy_return_1d
      - copper_return_1d
      - gold_return_1d

  identity:
    enabled: true
    features:
      - sector
      - market_type
      - market_cap_group

    excluded:
      - ticker
      - stock_code

  model_feature_sets:
    ranking_model:
      include_groups:
        - price
        - momentum
        - volume
        - volatility
        - candlestick
        - breakout
        - technical
        - cross_sectional
        - macro
        - identity

    gap_model:
      include_groups:
        - price
        - momentum
        - volume
        - volatility
        - breakout
        - technical
        - cross_sectional
        - macro
        - identity

      priority_features:
        - nasdaq_return_1d
        - sox_return_1d
        - sp500_return_1d
        - vix_change_1d
        - usdkrw_return_1d
        - wti_return_1d
        - relative_return_5d_vs_market
        - relative_trading_value
        - atr_percent

    intraday_model:
      include_groups:
        - price
        - momentum
        - volume
        - volatility
        - candlestick
        - breakout
        - technical
        - cross_sectional
        - macro
        - identity

      priority_features:
        - return_5d
        - return_20d
        - momentum_diff
        - relative_return_20d_vs_sector
        - trading_value_rank_pct
        - body
        - close_position
        - close_to_20d_high
        - macd_hist_ratio
        - bb_position
        - atr_percent

  missing_value:
    min_history_days: 120
    drop_rows_with_core_feature_na: true
    fill_macro_missing: "forward_fill"
    fill_identity_missing: "unknown"
    fill_rank_missing: null

  scaling:
    required_for_lightgbm: false
    target_scaling: false
    feature_scaling: false

  leakage_rules:
    shift_before_rolling: true
    feature_date_must_be_before_target_date: true
    target_columns_forbidden_in_features: true
    t_day_ohlcv_forbidden: true
    cross_sectional_rank_groupby_date: true

  output:
    feature_dataset_path: "data/processed/features/features.parquet"
    feature_metadata_path: "outputs/features/feature_metadata.json"
    save_feature_list: true
    save_feature_importance: true
